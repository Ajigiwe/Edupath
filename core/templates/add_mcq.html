{% extends 'base.html' %}
{% block content %}

<main class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <!-- Header -->
                <div class="mb-5">
                    <h1 class="fw-bold display-6 mb-2">
                        <i class="bi bi-checkbox2-checked text-primary me-3"></i>Add MCQ Question
                    </h1>
                    <p class="text-muted">Create a new multiple choice question for students to practice</p>
                </div>

                <!-- Form Card -->
                <div class="card border-0 shadow">
                    <div class="card-body p-5">
                        <form method="POST" action="{% url 'create_mcq' %}">
                            {% csrf_token %}

                            <!-- Question -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Question</label>
                                <textarea name="question" class="form-control" rows="4"
                                    placeholder="Enter the MCQ question..." required></textarea>
                                <small class="text-muted">Be clear and concise</small>
                            </div>

                            <!-- Options -->
                            <div class="mb-4">
                                <label class="form-label fw-bold mb-3">Answer Options</label>
                                <div class="row g-2">
                                    <div class="col-12 col-md-6">
                                        <input type="text" name="opt1" class="form-control" 
                                            placeholder="Option A" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <input type="text" name="opt2" class="form-control" 
                                            placeholder="Option B" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <input type="text" name="opt3" class="form-control" 
                                            placeholder="Option C" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <input type="text" name="opt4" class="form-control" 
                                            placeholder="Option D" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Correct Answer -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Correct Answer</label>
                                <select name="correct" class="form-select" title="Select the correct answer" required>
                                    <option value="">-- Select the correct option --</option>
                                    <option value="1">Option A</option>
                                    <option value="2">Option B</option>
                                    <option value="3">Option C</option>
                                    <option value="4">Option D</option>
                                </select>
                            </div>

                            <!-- Divider -->
                            <hr class="my-5">

                            <!-- Classification Row 1 -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Course</label>
                                    <select name="course" class="form-select" title="Select Course" required>
                                        <option value="">-- Select Course --</option>
                                        {% for c in courses %}
                                        <option value="{{ c.id }}">{{ c.coursename }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Department</label>
                                    <select name="department" class="form-select" title="Select Department" required>
                                        <option value="">-- Select Department --</option>
                                        {% for d in departments %}
                                        <option value="{{ d.id }}">{{ d.name }} - {{ d.institution.institutionname }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <!-- Classification Row 2 -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Level Type</label>
                                    <select name="levelname" class="form-select" title="Select Level Type" required>
                                        <option value="">-- Select Level Type --</option>
                                        {% for l in levelnames %}
                                        <option value="{{ l.id }}">{{ l.levelsname }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Year Level</label>
                                    <select name="level" class="form-select" title="Select Year" required>
                                        <option value="">-- Select Year --</option>
                                        {% for l in levels %}
                                        <option value="{{ l.id }}">Year {{ l.level_number }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-5">
                                <button type="submit" class="btn btn-primary flex-fill fw-bold">
                                    <i class="bi bi-check-circle me-2"></i>Save MCQ Question
                                </button>
                                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left me-2"></i>Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPath Ghana</title>

    <!-- Fonts: Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

    <!-- Icon Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'assets/main.css' %}" />

</head>

<body>
    
    {% include 'partials/navbar.html' %}

    {% block content %}
    {% endblock %}
    {% include 'partials/footer.html' %}
    
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery & Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.4.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    {% block scripts %}{% endblock %}

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Initialize Select2 dropdowns
            $('.select2').each(function () {
                $(this).select2({
                    placeholder: $(this).data('placeholder'),
                    allowClear: true,
                    theme: "bootstrap-5"
                });
            });

            // Modal handling
            const modalTitle = document.getElementById('jobDescriptionModalLabel');
            const modalBody = document.getElementById('jobDescriptionContent');

            document.querySelectorAll('.read-more-btn').forEach(button => {
                button.addEventListener('click', function () {
                    const title = this.getAttribute('data-title') || 'Job Description';
                    const description = this.getAttribute('data-description') || 'No description available.';

                    if (modalTitle) modalTitle.textContent = title;
                    if (modalBody) modalBody.textContent = description;
                });
            });
        });
    </script>

</body>

</html>

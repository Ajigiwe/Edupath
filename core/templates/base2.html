{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPath Ghana</title>

    <!-- Fonts: Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

    <!-- Icon Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'assets/main.css' %}" />

</head>

<body>
    
    {% include 'partials/user_navbar.html' %}

    {% block content %}
    {% endblock %}
    {% include 'partials/footer.html' %}
    
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery & Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.4.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    {% block scripts %}{% endblock %}

    <script>
        function openModal(el){
            document.querySelectorAll('.modal-backdrop').forEach(function(b){b.remove();});
            document.body.classList.remove('modal-open');
            document.body.style.overflow='';
            document.body.style.paddingRight='';
            var m=new bootstrap.Modal(el);
            el.addEventListener('hidden.bs.modal',function cleanup(){
                document.querySelectorAll('.modal-backdrop').forEach(function(b){b.remove();});
                document.body.classList.remove('modal-open');
                document.body.style.overflow='';
                document.body.style.paddingRight='';
                el.removeEventListener('hidden.bs.modal',cleanup);
            },{once:true});
            m.show();
        }

        document.addEventListener("DOMContentLoaded", function () {
            // Initialize Select2
            $('.select2').each(function () {
                $(this).select2({
                    placeholder: $(this).data('placeholder'),
                    allowClear: true,
                    theme: "bootstrap-5"
                });
            });
        });

        document.addEventListener("click", function (e) {
            const aboutBtn = e.target.closest(".read-more-btn");
            const careerBtn = e.target.closest(".show-career-btn");
            const modalTitle = document.getElementById("jobDescriptionModalLabel");
            const modalBody = document.getElementById("jobDescriptionContent");

            if (aboutBtn && modalTitle && modalBody) {
                let description = aboutBtn.dataset.description || "No description available";
                modalTitle.innerText = "About the Program";
                modalBody.textContent = description;
                openModal(document.getElementById('jobDescriptionModal'));
            }

            if (careerBtn && modalTitle && modalBody) {
                let career = careerBtn.dataset.career || "No career path available";
                modalTitle.innerText = "Career Path";
                modalBody.textContent = career;
                openModal(document.getElementById('jobDescriptionModal'));
            }
        });
    </script>

</body>

</html>
